<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0e0b09">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Cortado</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header id="hero" class="hero"></header>
  <main id="screen" class="screen"></main>
  <nav id="nav" class="nav">
    <button class="nav-item" data-screen="menu">MENU</button>
    <button class="nav-item" data-screen="stats">STATS</button>
    <button class="nav-item" data-screen="manage">MANAGE</button>
    <button class="nav-item" data-screen="settings">SETTINGS</button>
  </nav>
  <div id="toast" class="toast" hidden></div>
  <div id="confirm" class="confirm-overlay" hidden>
    <div class="confirm-box">
      <div class="confirm-msg" id="confirm-msg"></div>
      <div class="confirm-actions">
        <button class="btn secondary" id="confirm-no">Cancel</button>
        <button class="btn" id="confirm-yes">Confirm</button>
      </div>
    </div>
  </div>
  <div id="edit" class="detail-overlay" hidden>
    <div class="detail-box">
      <button class="detail-close" id="edit-close" aria-label="Close">✕</button>
      <div class="detail-body">
        <h2 class="detail-name">Edit coffee</h2>
        <div id="edit-form"></div>
        <div class="confirm-actions" style="margin-top:18px">
          <button class="btn secondary" id="edit-cancel">Cancel</button>
          <button class="btn" id="edit-save">Save</button>
        </div>
      </div>
    </div>
  </div>
  <div id="detail" class="detail-overlay" hidden>
    <div class="detail-box">
      <button class="detail-close" id="detail-close" aria-label="Close">✕</button>
      <img class="detail-img" id="detail-img" alt="">
      <div class="detail-body">
        <h2 class="detail-name" id="detail-name"></h2>
        <p class="detail-desc" id="detail-desc"></p>
        <div class="detail-meta" id="detail-meta"></div>
        <button class="btn" id="detail-add">Add ☕</button>
      </div>
    </div>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
